<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скоро запуск! | Наш проект</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7367F0;
            --primary-dark: #5A4FE0;
            --text: #2E2E3A;
            --light: #F8F8FA;
            --gradient: linear-gradient(135deg, #7367F0 0%, #A66DE9 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(115, 103, 240, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(166, 109, 233, 0.1) 0%, transparent 20%);
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            position: relative;
            overflow: hidden;
            transform: translateY(0);
            animation: float 6s ease-in-out infinite;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: var(--gradient);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient);
            color: white;
            font-size: 32px;
            font-weight: bold;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(115, 103, 240, 0.3);
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            color: var(--text);
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }
        
        p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #666;
        }
        
        .construction {
            font-size: 60px;
            margin: 30px 0;
            animation: bounce 2s ease infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .progress-container {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 10px;
            margin: 40px 0;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            width: 65%;
            background: var(--gradient);
            border-radius: 10px;
            animation: progress 2s ease-in-out infinite alternate;
        }
        
        @keyframes progress {
            0% { width: 65%; }
            100% { width: 75%; }
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        
        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }
        
        .notify-btn {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(115, 103, 240, 0.3);
        }
        
        .notify-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(115, 103, 240, 0.4);
        }
        
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: float-particle 15s infinite linear;
        }
        
        @keyframes float-particle {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { opacity: 0.1; }
            100% { transform: translateY(-500px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">App</div>
        <h1>Скоро запуск!</h1>
        <p>Мы усердно работаем над созданием уникального сервиса, который вам понравится.</p>
        
        <div class="construction">🚀</div>
        
        <p>Приложение находится в активной разработке. Следите за обновлениями!</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <button class="notify-btn">Сообщить мне о запуске</button>
        
        <div class="social-links">
            <a href="#" class="social-link">📱</a>
            <a href="#" class="social-link">📧</a>
            <a href="#" class="social-link">🔔</a>
        </div>
    </div>
    
    <div class="particles" id="particles"></div>
    
    <script>
        // Создание частиц
        const particlesContainer = document.getElementById('particles');
        const particleCount = 20;
        
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Случайные параметры
            const size = Math.random() * 10 + 5;
            const posX = Math.random() * 100;
            const delay = Math.random() * 15;
            const duration = Math.random() * 10 + 10;
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${posX}%`;
            particle.style.animationDelay = `${delay}s`;
            particle.style.animationDuration = `${duration}s`;
            
            particlesContainer.appendChild(particle);
        }
        
        // Обработка кнопки
        document.querySelector('.notify-btn').addEventListener('click', function() {
            this.textContent = 'Спасибо! Мы вас оповестим';
            this.style.background = '#4CAF50';
            setTimeout(() => {
                this.textContent = 'Сообщить мне о запуске';
                this.style.background = 'linear-gradient(135deg, #7367F0 0%, #A66DE9 100%)';
            }, 2000);
        });
    </script>
</body>
</html>
