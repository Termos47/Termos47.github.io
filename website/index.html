<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline'">
    <title>Сайт в разработке</title>
    <style>
        /* CSS остается без изменений */
    </style>
</head>
<body>
    <div class="container">
        <div class="construction-icon">🚧</div>
        <h1>Сайт находится в разработке</h1>
        <p>Следите за обновлениями в нашем Telegram-канале:</p>
        <a href="#" id="tg-channel" style="color: #fff; text-decoration: none;">
            Перейти в канал
        </a>
    </div>

    <script>
        // Безопасное получение ссылки
        (function() {
            const channelLink = localStorage.getItem('TG_CHANNEL') || 'https://t.me/ваш_канал';
            document.getElementById('tg-channel').href = channelLink;
            
            // Защита от инъекций
            const sanitize = url => {
                try {
                    return new URL(url).href;
                } catch {
                    return '#';
                }
            };
            
            document.getElementById('tg-channel').href = sanitize(channelLink);
        })();
    </script>
</body>
</html>
